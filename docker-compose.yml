services:
  autosim:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://auto-sim.ru}
    container_name: autosim-next
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://auto-sim.ru}
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: autosim
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:?TELEGRAM_ADMIN_CHAT_ID is required}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:?TELEGRAM_WEBHOOK_SECRET is required}
    ports:
      - "3002:3000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/robots.txt >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  telegram-webhook:
    image: node:22-alpine
    container_name: autosim-telegram-webhook
    working_dir: /app
    restart: "no"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:?TELEGRAM_WEBHOOK_SECRET is required}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-https://learning-gibbon-previously.ngrok-free.app/api/telegram/webhook}
    volumes:
      - ./scripts:/app/scripts:ro
      - ./package.json:/app/package.json:ro
      - ./.env:/app/.env:ro
    command: sh -c "node scripts/set-telegram-webhook.mjs $$TELEGRAM_WEBHOOK_URL"
    depends_on:
      autosim:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: autosim-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  mongo-data:
