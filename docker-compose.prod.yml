name: autosim-prod

services:
  autosim:
    image: autosim-app:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: mirror.gcr.io/library/node:22-alpine
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://auto-sim.ru}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://auto-sim.ru}
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: ${MONGODB_DB:-autosim}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:?TELEGRAM_ADMIN_CHAT_ID is required}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:?TELEGRAM_WEBHOOK_SECRET is required}
      TELEGRAM_PROXY_URL: http://hysteria:8080
    depends_on:
      hysteria:
        condition: service_started
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/robots.txt >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: mirror.gcr.io/library/nginx:1.30-alpine
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - |
        while :; do
          sleep 6h & wait $$!
          nginx -s reload
        done &
        exec nginx -g 'daemon off;'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./volume/letsencrypt:/etc/letsencrypt:ro
      - ./volume/certbot-webroot:/var/www/certbot:ro
    depends_on:
      autosim:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  certbot:
    image: mirror.gcr.io/certbot/certbot:v5.7.0
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap exit TERM
        while :; do
          certbot renew --webroot --webroot-path /var/www/certbot --quiet
          sleep 12h & wait $$!
        done
    volumes:
      - ./volume/letsencrypt:/etc/letsencrypt
      - ./volume/certbot-webroot:/var/www/certbot
    depends_on:
      nginx:
        condition: service_healthy

  certbot-init:
    image: mirror.gcr.io/certbot/certbot:v5.7.0
    profiles: ["init"]
    ports:
      - "80:80"
    volumes:
      - ./volume/letsencrypt:/etc/letsencrypt
    command:
      - certonly
      - --standalone
      - --preferred-challenges
      - http
      - --non-interactive
      - --agree-tos
      - --no-eff-email
      - --keep-until-expiring
      - --cert-name
      - auto-sim.ru
      - --email
      - ${LETSENCRYPT_EMAIL:?LETSENCRYPT_EMAIL is required}
      - -d
      - auto-sim.ru
      - -d
      - www.auto-sim.ru

  telegram-webhook:
    image: autosim-app:latest
    restart: "no"
    working_dir: /app
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?TELEGRAM_BOT_TOKEN is required}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:?TELEGRAM_WEBHOOK_SECRET is required}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-https://auto-sim.ru/api/telegram/webhook}
      TELEGRAM_PROXY_URL: http://hysteria:8080
    command: ["node", "scripts/set-telegram-webhook.mjs", "${TELEGRAM_WEBHOOK_URL:-https://auto-sim.ru/api/telegram/webhook}"]
    depends_on:
      hysteria:
        condition: service_started
      nginx:
        condition: service_healthy

  hysteria:
    image: tobyxdd/hysteria:latest
    command: ["client", "-c", "/etc/hysteria/client.yaml"]
    restart: unless-stopped
    volumes:
      - ./hysteria-client.yaml:/etc/hysteria/client.yaml:ro

  mongo:
    image: mirror.gcr.io/library/mongo:7
    restart: unless-stopped
    volumes:
      - ./volume/mongo:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
